
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annual Exam Result 2026</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f2f5;
    margin: 0;
    padding: 0;
}

/* Top Blue Header */
.header {
    background: #0b5ed7;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

/* Form Container */
.container {
    background: white;
    width: 90%;
    max-width: 350px;
    margin: 30px auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

label {
    font-size: 14px;
    display: block;
    margin-top: 10px;
}

input, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* Buttons */
.btn {
    width: 48%;
    padding: 10px;
    margin-top: 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
}

.submit {
    background: #0b5ed7;
    color: white;
}

.back {
    background: gray;
    color: white;
}

/* Result */
.result {
    margin-top: 20px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    color: red;
}
</style>
</head>

<body>

<div class="header">
    Annual Examination Result 2026
</div>

<div class="container">

<form onsubmit="showResult(); return false;">

<label>Student ID</label>
<input type="text" required>

<label>Class</label>
<select required>
<option value="">Select Class</option>
<script>
for(let i=1;i<=12;i++){
    document.write(`<option>${i}</option>`);
}
</script>
</select>

<label>Section</label>
<select required>
<option value="">Select Section</option>
<script>
for(let i=65;i<=90;i++){
    document.write(`<option>${String.fromCharCode(i)}</option>`);
}
</script>
</select>

<label>Date of Birth</label>
<input type="date" required>

<label>Captcha (Enter 1234)</label>
<input type="text" id="captcha" required>

<div style="display:flex; justify-content:space-between;">
<button class="btn submit" type="submit">Submit</button>
<button class="btn back" type="button" onclick="history.back()">Back</button>
</div>

</form>

<div id="result" class="result"></div>

</div>

<script>
function showResult(){
    let captcha = document.getElementById("captcha").value;

    if(captcha !== "1234"){
        alert("Wrong Captcha!");
        return;
    }

    document.getElementById("result").innerHTML = "❌ Result: FAIL";
}
</script>

</body>
